<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Presence House{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '865461039908003');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=865461039908003&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QZSQ33KC3K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-QZSQ33KC3K');
  </script>
</head>
<body>
  <header class="topbar" data-nav-shell>
    <div class="shell nav-wrap">
      <a href="{{ url_for('index') }}" class="brand">Presence House</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-menu-toggle>☰</button>
      <nav id="site-nav" class="nav-links" data-nav-links>
        <a href="{{ url_for('index') }}#philosophy">Philosophy</a>
        <a href="{{ url_for('index') }}#house">The House</a>
        <a href="{{ url_for('index') }}#campaign">Campaign</a>
        <a href="{{ url_for('index') }}#voice">Voice</a>
        <a href="{{ url_for('index') }}#faq">FAQ</a>
        <a href="{{ url_for('gallery') }}">Gallery</a>
        <a href="{{ url_for('gallery2') }}">Gallery2</a>
      </nav>
      <div class="nav-cta" data-nav-cta>
        <a class="btn" href="http://spot.fund/9s54l27sc" target="_blank" rel="noopener noreferrer">Support Campaign</a>
      </div>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <section class="shell flash-wrap">{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}</section>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
