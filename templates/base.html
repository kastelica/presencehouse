<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Presence House{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Presence House is a space for real connection in Carlsbad, CA—fewer screens, in-person activities and games, and the warmth of a shared room. We are in Phase 1 fundraising.{% endblock %}">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <link rel="canonical" href="{{ request.url }}">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dapxfxumu/image/upload/v1779043245/07016583-38a3-4296-a97d-471c0aaa4141_reukcr.png">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dapxfxumu/image/upload/v1779043245/07016583-38a3-4296-a97d-471c0aaa4141_reukcr.png">

  <meta property="og:site_name" content="Presence House">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}Presence House | A Space for Human Connection{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Presence House is a space for real connection in Carlsbad, CA—fewer screens, in-person activities and games, and a warm shared room. Phase 1 fundraising is live.{% endblock %}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="https://res.cloudinary.com/dapxfxumu/image/upload/v1779043245/07016583-38a3-4296-a97d-471c0aaa4141_reukcr.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block twitter_title %}Presence House | A Space for Human Connection{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}Presence House is a space for real connection in Carlsbad, CA. Fewer screens, in-person activities, and a warm shared room.{% endblock %}">
  <meta name="twitter:image" content="https://res.cloudinary.com/dapxfxumu/image/upload/v1779043245/07016583-38a3-4296-a97d-471c0aaa4141_reukcr.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Presence House",
    "url": "https://presence.homes/",
    "logo": "https://res.cloudinary.com/dapxfxumu/image/upload/v1779043245/07016583-38a3-4296-a97d-471c0aaa4141_reukcr.png",
    "sameAs": ["http://spot.fund/9s54l27sc"]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Presence House",
    "url": "https://presence.homes/"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '865461039908003');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=865461039908003&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QZSQ33KC3K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-QZSQ33KC3K');
  </script>
</head>
<body>
  <header class="topbar" data-nav-shell>
    <div class="shell nav-wrap">
      <a href="{{ url_for('index') }}" class="brand">Presence House</a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-menu-toggle>☰</button>
      <nav id="site-nav" class="nav-links" data-nav-links>
        <a href="{{ url_for('index') }}#philosophy">Philosophy</a>
        <a href="{{ url_for('index') }}#house">The House</a>
        <a href="{{ url_for('index') }}#campaign">Campaign</a>
        <a href="{{ url_for('index') }}#voice">Voice</a>
        <a href="{{ url_for('index') }}#faq">FAQ</a>
        <a href="{{ url_for('gallery') }}">Gallery</a>
      </nav>
      <div class="nav-cta" data-nav-cta>
        <a class="btn" href="http://spot.fund/9s54l27sc" target="_blank" rel="noopener noreferrer">Support Campaign</a>
      </div>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <section class="shell flash-wrap">{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}</section>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
