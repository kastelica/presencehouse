<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Presence House{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="shell nav-wrap">
      <a href="{{ url_for('index') }}" class="brand">Presence House</a>
      <nav class="nav-links">
        <a href="#philosophy">Philosophy</a>
        <a href="#house">The House</a>
        <a href="#campaign">Campaign</a>
        <a href="#voice">Voice</a>
        <a href="#faq">FAQ</a>
        <a href="{{ url_for('gallery') }}">Gallery</a>
      </nav>
      <div class="nav-cta">
        <a class="btn" href="http://spot.fund/j2brwjqsc" target="_blank" rel="noopener noreferrer">Support Campaign</a>
      </div>
    </div>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <section class="shell flash-wrap">{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}</section>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
